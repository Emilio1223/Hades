{% extends 'list.html' %} 

{% block columns %}
<tr>
  <th>Nro</th>
  <th>Nombre</th>
  <th>Opciones</th>
</tr>
{% endblock %} 

{% block rows %} 
{% for category in object_list %}
<tr>
  <td>{{ category.id }}</td>
  <td>{{ category.name }}</td>
  <td>
    <button
      type="button"
      class="btn btn-primary btn-xs"
    >
      <i class="fas fa-edit"></i>
    </button>
    <button
      type="button"
      class="btn btn-danger btn-xs"
    >
      <i class="fas fa-trash"></i>
    </button>
  </td>
</tr>
{% endfor %} {% endblock %}
